.hud{display:flex;gap:10px;flex-wrap:wrap}
.chip{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 16px;text-align:center;backdrop-filter:blur(8px)}

const KEY="karthik_dashboard_v2";
let state=load();
function load(){
  try{
    const s=JSON.parse(localStorage.getItem(KEY));
    if(s&&s.projects){
      PROJECTS.forEach(dp=>{
        const sp=s.projects.find(p=>p.id===dp.id);
        if(!sp){s.projects.push(JSON.parse(JSON.stringify(dp)));return;}
        sp.title=dp.title;sp.desc=dp.desc;sp.hint=dp.hint;sp.tag=dp.tag;sp.accent=dp.accent;sp.money=dp.money;sp.playbook=dp.playbook;
        dp.phases.forEach(dph=>{
          const sph=sp.phases.find(x=>x.name===dph.name);
          if(!sph){sp.phases.push(JSON.parse(JSON.stringify(dph)));return;}
          dph.steps.forEach(ds=>{ if(!sph.steps.some(t=>t.t===ds.t)) sph.steps.push({...ds,d:!!ds.d}); });
        });
      });
      s.projects.sort((a,b)=>PROJECTS.findIndex(p=>p.id===a.id)-PROJECTS.findIndex(p=>p.id===b.id));
      return s;
    }
  }catch(e){}
  return {projects:JSON.parse(JSON.stringify(PROJECTS))};
}

function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;");}

const SB="https://drgnimyotoqrzuxflxpy.supabase.co/rest/v1";
const SBKEY="sb_publishable_0HIvS0GHcoilXvwDqpfNXA_xh2ocXVO";
const SBH={apikey:SBKEY, Authorization:"Bearer "+SBKEY};
let todos=null, todoErr=false;
function fetchTodos(){
  todoErr=false;
  fetch(SB+"/todo?select=id,text,done&done=eq.false&order=id.desc",{headers:SBH})
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
    .then(d=>{todos=Array.isArray(d)?d:[];render();})
    .catch(()=>{todoErr=true;render();});
}
function todoDone(id){
  fetch(SB+"/todo?id=eq."+id,{method:"PATCH",headers:{...SBH,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({done:true})})
    .then(r=>{if(!r.ok)throw new Error(r.status); if(todos) todos=todos.filter(t=>t.id!==id); render();})
    .catch(()=>{todoErr=true;render();});
}
function todoAdd(){
  const inp=document.getElementById("todoAdd"); if(!inp)return;
  const text=(inp.value||"").trim(); if(!text)return;
  inp.value="";
  fetch(SB+"/todo",{method:"POST",headers:{...SBH,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({text})})
    .then(r=>{if(!r.ok)throw new Error(r.status); fetchTodos();})
    .catch(()=>{todoErr=true;render();});
}

  if(todoErr) body=`<div class="tip" style="margin-top:12px;border-color:rgba(248,113,113,.4);color:var(--red)">⚠️ Couldn't reach to-do list — try again in a bit.</div>`;
  else if(todos===null) body=`<div class="sub" style="margin-top:12px">Loading…</div>`;
  else if(!todos.length) body=`<div class="tip" style="margin-top:12px">No open to-dos — say "SK, add task…" to add one.</div>`;
  else body=`<ul class="next">${todos.map(t=>`<li><input type="checkbox" onchange="todoDone(${t.id})"><label>${esc(t.text)}</label></li>`).join("")}</ul>`;
  return `<div class="w span4" id="todoWidget" style="--ac:var(--cyan)">
    <h2><span class="dot"></span>To-Do</h2><div class="sub">Live from your list — tick to clear it</div>
    ${body}
    <div class="todo-add"><input id="todoAdd" placeholder="Add a task…" onkeydown="if(event.key==='Enter')todoAdd()"><button class="btn ac" onclick="todoAdd()">Add</button></div>
  </div>`;
}

function ring(pct,ac){
  const r=26,c=2*Math.PI*r;
  return `<div class="ringbox"><svg width="64" height="64"><circle cx="32" cy="32" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"/><circle cx="32" cy="32" r="${r}" fill="none" stroke="${ac}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-pct)}" style="filter:drop-shadow(0 0 5px ${ac})"/></svg><div class="pct">${Math.round(pct*100)}%</div></div>`;
}
function badgeFor(id){
  if(id==="sprout") return '<span class="badge pri">★ Priority</span>';
  if(id==="safeframe") return '<span class="badge hold">On hold</span>';
  return '';
}
function appWidget(p, span){
  const tot=flat(p).length, d=doneN(p), cur=curStep(p);
  const nexts=flat(p).filter(t=>!t.d).slice(1,4);
  return `<div class="w appw span${span}" style="--ac:${p.accent}">
    <div class="top"><div><h2><span class="dot"></span>${esc(p.title)} ${badgeFor(p.id)}</h2><div class="sub">${esc(p.tag)}</div></div>${ring(tot?d/tot:0,p.accent)}</div>
    ${cur?`<div class="phase">▸ ${esc(cur.ph.name)}</div><div class="here-step"><b>YOU ARE HERE</b>${esc(cur.st.t)}</div>`:`<div class="here-step"><b>🎉 COMPLETE</b>All steps done</div>`}
    <ul class="next">${nexts.map(t=>{
      const gi=flat(p).indexOf(t);
      return `<li class="${t.f?'f':''}"><input type="checkbox" data-p="${p.id}" data-g="${gi}" onchange="tick(this)"><label>${esc(t.t)}</label></li>`;}).join("")}</ul>
    <div class="wfoot">
      <button class="btn ac" onclick="openOv('${p.id}')">Full roadmap</button>
      ${p.playbook?`<button class="btn" onclick="this.closest('.w').querySelector('.playbook').classList.toggle('open')">💡 Build &amp; earn playbook</button>`:""}
    </div>
    ${p.playbook?`<div class="playbook">${p.playbook.map((s,i)=>`<div class="step"><span class="n">0${i+1}</span><span>${esc(s[0])}<br><span style="color:${s[1].startsWith('MONEY')?'var(--green)':'var(--dim)'};font-size:11.5px">${esc(s[1])}</span></span></div>`).join("")}</div>`:""}
  </div>`;
}
function tick(cb){
  const p=state.projects.find(x=>x.id===cb.dataset.p);
  flat(p)[+cb.dataset.g].d=cb.checked; save();
}
function moneyWidget(){
  const rows=[["sprout","One Journey"],["skai","SKAI"],["studio","Studio"],["safeframe","OneSafe"]].map(([id,name])=>{
    const p=state.projects.find(x=>x.id===id);
    return `<div class="money-row"><div><b>${name}</b><div class="model">${esc(p.money)}</div></div>
      <div style="text-align:right"><div style="font-size:10px;color:var(--dim);letter-spacing:.08em">TARGET S$/MO</div>
      <input value="${esc(targets[id]||"")}" placeholder="0" onchange="targets['${id}']=this.value;localStorage.setItem(KEY+'_targets',JSON.stringify(targets))"></div></div>`;
  }).join("");
  return `<div class="w span4" style="--ac:var(--green)"><h2><span class="dot"></span>Money Engine</h2><div class="sub">How each app earns — set your monthly targets</div><div style="margin-top:10px">${rows}</div></div>`;
}
function coursivWidget(){
  const p=state.projects.find(x=>x.id==="coursiv");
  const tot=flat(p).length,d=doneN(p);const cur=curStep(p);
  return `<div class="w span4" style="--ac:#F472B6"><div class="top"><div><h2><span class="dot"></span>Coursiv</h2><div class="sub">ChatGPT &amp; Apps · 2/13 lessons · streak 🔥</div></div>${ring(tot?d/tot:0,"#F472B6")}</div>
  ${cur?`<div class="here-step" style="margin-top:12px"><b>NEXT</b>${esc(cur.st.t)}</div>`:""}
  <div class="wfoot"><button class="btn ac" onclick="openOv('coursiv')">Open</button><button class="btn" onclick="openOv('other')">Other activities</button></div></div>`;
}
function linksWidget(){
  return `<div class="w span4" style="--ac:var(--violet)"><h2><span class="dot"></span>Quick Launch</h2><div class="sub">Your working tools</div>
  <div class="links">
    <a href="https://app.coursiv.io" target="_blank">Coursiv <small>daily lesson</small></a>
    <a href="https://pagepilot.ai" target="_blank">Page Pilot <small>skai store pages</small></a>
    <a href="https://docs.google.com/forms/d/14FbCzE6DXH_frXxxhQe88qUSwMSkPK1PqTN5ihAjyhc/edit" target="_blank">One Journey Survey <small>share this</small></a>
    <a href="https://docs.google.com/spreadsheets/d/1KOau5_mwvmiNUIdHyeh2clr5EH0ofOg4cYhlCRFqOvU/edit" target="_blank">Survey Responses <small>watch it grow</small></a>
    <a href="https://lovable.dev/projects/b010de83-e29d-4a37-8536-62de51df5a16" target="_blank">OneSafe (Lovable) <small>legacy preview</small></a>
  </div></div>`;
}
function skillsWidget(){
  return `<div class="w span12" style="--ac:var(--cyan)"><h2><span class="dot"></span>Your AI Toolkit — how to use your new skills</h2>
  <div class="sub">Type these in Claude (Cowork) — or just ask in plain words, the right skill fires automatically</div>
  <div class="tipbox" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px">
    <div class="tip"><code>/synthesize-research</code> → paste your One Journey survey responses, get ranked insights on what parents will pay for</div>
    <div class="tip"><code>/campaign-plan</code> → full launch campaign for One Journey or a SKAI product, with week-by-week calendar</div>
    <div class="tip"><code>/draft-content</code> → ad copy, Instagram captions, landing page text for any of the three apps</div>
    <div class="tip"><code>/write-spec</code> → turn "I want OneSafe to search hazards" into a proper build plan</div>
    <div class="tip"><code>/roadmap-update</code> → reshuffle priorities across your three apps when plans change</div>
    <div class="tip"><code>/start</code> (productivity) → Claude builds a memory of your projects so you never re-explain</div>
  </div></div>`;
}
function render(){
  const all=state.projects;
  let open=0,dn=0,fl=0,tot=0;
  all.forEach(p=>flat(p).forEach(t=>{tot++;t.d?dn++:open++;if(t.f&&!t.d)fl++;}));
  hOpen.textContent=open;hDone.textContent=dn;hFlag.textContent=fl;hPct.textContent=Math.round(100*dn/tot)+"%";
  const brief=`<div class="w span12" style="--ac:var(--amber)"><h2><span class="dot"></span>Daily Brief — ${esc(DAILY_BRIEF.date)}</h2>
    <div class="tipbox" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px">${DAILY_BRIEF.lines.map(l=>`<div class="tip">${esc(l)}</div>`).join("")}</div></div>`;
  document.getElementById("grid").innerHTML = brief + todoWidget() +
    appWidget(state.projects.find(p=>p.id==="sprout"),4) +
    appWidget(state.projects.find(p=>p.id==="skai"),4) +
    appWidget(state.projects.find(p=>p.id==="studio"),4) +
    appWidget(state.projects.find(p=>p.id==="safeframe"),4) +
    moneyWidget() + coursivWidget() + linksWidget() + skillsWidget();
}
function openOv(id){
  const p=state.projects.find(x=>x.id===id);
  let found=false;
  const html=`<button class="close" onclick="closeOv()">✕</button>
    <h3 style="color:${p.accent}">${esc(p.title)} ${badgeFor(p.id)}</h3><div class="sub">${esc(p.desc)}</div>
    ${p.id==="safeframe"?`<div class="tip" style="border-color:rgba(251,191,36,.4);color:var(--amber)">⏸ ON HOLD until end of month — resume after One Journey launches.</div>`:""}
    ${p.hint?`<div class="tip">💡 ${esc(p.hint)}</div>`:""}
    ${p.phases.map((ph,pi)=>{
      const phDone=ph.steps.length&&ph.steps.every(t=>t.d);
      return `<div class="ph" style="--ac:${p.accent}"><div class="ph-head"><span class="num ${phDone?'done':''}" style="background:${phDone?'var(--green)':p.accent}">${phDone?'✓':pi+1}</span>${esc(ph.name)}</div>
      ${ph.steps.map(t=>{
        const cur=!t.d&&!found; if(cur)found=true;
        const gi=flat(p).indexOf(t);
        return `<div class="step ${t.d?'done':''} ${cur?'cur':''}" style="--ac:${p.accent}">
          <input type="checkbox" data-p="${p.id}" data-g="${gi}" ${t.d?'checked':''} onchange="tick(this);openOv('${p.id}')">
          <label>${esc(t.t)}</label>
          <span class="flag ${t.f?'':'off'}" onclick="toggleFlag('${p.id}',${gi})">⚑</span></div>`;
      }).join("")}</div>`;
    }).join("")}`;
  document.getElementById("sheet").innerHTML=html;
  document.getElementById("overlay").classList.add("open");
}
function toggleFlag(pid,gi){
  const p=state.projects.find(x=>x.id===pid);
  flat(p)[gi].f=!flat(p)[gi].f; save(); openOv(pid);
}
function closeOv(){document.getElementById("overlay").classList.remove("open");render();}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeOv()});
setInterval(()=>{document.getElementById("clock").textContent=new Date().toLocaleString("en-SG",{weekday:"short",day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit"})},1000);
render();
fetchTodos();
</script>
</body>
</html>
